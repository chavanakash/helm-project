{{- if .Values.database.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-app.fullname" . }}-db-secret
type: Opaque
stringData:
  POSTGRES_USER:     {{ .Values.database.credentials.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.database.credentials.postgresPassword | quote }}
  POSTGRES_DB:       {{ .Values.database.credentials.postgresDb | quote }}
  DATABASE_URL: "postgresql://{{ .Values.database.credentials.postgresUser }}:{{ .Values.database.credentials.postgresPassword }}@{{ include "devops-app.fullname" . }}-database:{{ .Values.database.service.port }}/{{ .Values.database.credentials.postgresDb }}"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "devops-app.fullname" . }}-database
  labels: {{- include "devops-app.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "devops-app.fullname" . }}-database
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "devops-app.fullname" . }}-database
  template:
    metadata:
      labels:
        app: {{ include "devops-app.fullname" . }}-database
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-app.fullname" . }}-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-app.fullname" . }}-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-app.fullname" . }}-db-secret
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command: ["pg_isready","-U","$(POSTGRES_USER)","-d","$(POSTGRES_DB)"]
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources: {{- toYaml .Values.database.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.database.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.database.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-app.fullname" . }}-database
spec:
  type: ClusterIP
  selector:
    app: {{ include "devops-app.fullname" . }}-database
  ports:
    - port: {{ .Values.database.service.port }}
      targetPort: 5432
{{- end }}